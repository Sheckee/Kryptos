name: KRYPTOS(RELEASER)
on:
   push:
      branches: [main]
      tags: ['v*']
   pull_request:
      branches: [main]
   workflow_dispatch:

concurrency:
   group: release-${{ github.ref }}
   cancel-in-progress: true

permissions:
   contents: write

jobs:
   buildJar:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - name: Set up PATH
           run: |
              echo "${ANDROID_HOME}/build-tools/34.0.0" >> $GITHUB_PATH

         - name: Set up JDK 17
           uses: actions/setup-java@v4
           with:
              distribution: temurin
              java-version: 17
              cache: gradle

         - name: Make gradlew executable
           run: chmod +x gradlew

         - name: Build mod jar
           run: ./gradlew deploy

         - name: Upload built jar file
           uses: actions/upload-artifact@v4
           with:
              name: ${{ github.event.repository.name }}
              path: build/libs/${{ github.event.repository.name }}.jar

         - name: Read version
           id: version
           run: |
                Version=$(grep -m1 '^version:' mod.hjson | sed 's/^version:[[:space:]]*//' | tr -d '\r"')
                if [[ "${{ github.ref_name }}" != "main" ]]; then
                Version="${Version}-beta"
                fi
                echo "tag=${Version}" >> $GITHUB_OUTPUT

         # Only cut a GitHub Release on pushes to main or version tags -
         # pull_request builds stop here (upload-artifact above still lets
         # you download the jar from the run for manual testing).
         - name: Create release
           if: github.event_name == 'push' && steps.version.outputs.tag != ''
           uses: softprops/action-gh-release@v2
           with:
              tag_name: "${{ steps.version.outputs.tag }}"
              name: "${{ steps.version.outputs.tag }}"
              prerelease: ${{ github.ref_name != 'main' }}
              files: |
                 build/libs/${{ github.event.repository.name }}.jar
           env:
              GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
